<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="compact">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Company Knowledge Assistant — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;450;500;550;600;650;700;750;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/layout.css" />
<link rel="stylesheet" href="css/center.css" />
<link rel="stylesheet" href="css/panels.css" />
<style>
  /* ---------- print-doc shell ---------- */
  html, body { height: auto; overflow: visible; }
  body { background: #1a1a19; margin: 0; }
  body { overflow-x: auto; }
  .doc { padding: 28px 0; }
  .page { display: flex; flex-direction: column; align-items: center; margin: 0 auto 30px; }
  .frame-scaler { zoom: 0.6; }   /* screen preview only */
  .cap { width: 1320px; margin: 0 auto 11px; display: flex; align-items: baseline; gap: 10px; }
  .cap b { font-family: "Figtree", sans-serif; font-size: 15px; font-weight: 700; color: #e9e7e4; letter-spacing: -.01em; }
  .cap span { font-family: "Figtree", sans-serif; font-size: 12px; color: #8a8783; }
  .cap .num { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: #6f6c68;
    border: 1px solid #34332f; border-radius: 5px; padding: 2px 6px; }

  /* the device frame carries its own theme tokens */
  .frame { width: 1320px; height: var(--fh, 900px); border-radius: 14px; overflow: hidden;
    background: var(--bg); border: 1px solid rgba(255,255,255,.10);
    box-shadow: 0 30px 80px -24px rgba(0,0,0,.6); position: relative; }

  /* static app layout — neutralize responsive/fixed behaviour */
  .pa { display: grid; height: 100%; }
  .pa[data-source="open"]   { grid-template-columns: 268px minmax(0,1fr) 392px; }
  .pa[data-source="closed"] { grid-template-columns: 268px minmax(0,1fr) 0px; }
  .pa .rail   { position: static !important; transform: none !important; }
  .pa .source { position: static !important; transform: none !important; box-shadow: none !important; }
  .pa .center { min-height: 0; }
  .pa .thread { overflow: hidden; }
  .pa textarea { pointer-events: none; }

  /* ---------- print ---------- */
  @media print {
    @page { size: A4 landscape; margin: 0.5cm; }
    html, body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .doc { padding: 0; }
    .page { margin: 0; break-after: page; height: auto; }
    .page:last-child { break-after: auto; }
    .frame-scaler { zoom: var(--pz, 0.79); }
    .cap b { color: #1f1d1a; } .cap span { color: #6b6862; } .cap .num { color: #6b6862; border-color: #d8d5d0; }
    .frame { box-shadow: none; border-color: rgba(0,0,0,.16); }
    /* force token-driven backgrounds/colours to print */
    .frame, .frame * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    /* headline: use solid colour in print (avoid background-clip dropouts) */
    .home h1 { -webkit-text-fill-color: var(--text) !important; background: none !important; }
  }
</style>
</head>
<body>
<div class="doc" id="doc"></div>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script>
(() => {
  const L = (s) => ICON.layers({ s });

  /* ---------- shared chrome ---------- */
  const rail = () => `
    <aside class="rail">
      <div class="rail__top"><div class="brand">
        <div class="brand__mark">${L(15)}</div>
        <div><div class="brand__name">Company Knowledge</div>
        <div class="brand__sub"><span class="dot-onenote"></span> Assistant · OneNote</div></div>
      </div></div>
      <button class="rail__search">${ICON.search()}<span>Search or ask…</span><span class="kbd">⌘K</span></button>
      <div class="seg" data-i="0"><span class="seg__thumb"></span>
        <button aria-selected="true">${ICON.book({ s: 14 })} Notebooks</button>
        <button aria-selected="false">${ICON.hash({ s: 14 })} Topics</button></div>
      <div class="rail__scroll scroll">${R.notebooks()}${R.railLists()}</div>
      <div class="rail__foot"><div class="avatar">PN</div>
        <div class="who"><b>Priya Nair</b><span>People Operations</span></div>
        <button class="iconbtn">${ICON.moon({ s: 16 })}</button></div>
    </aside>`;

  const topbar = (t) => `<div class="topbar"><div class="topbar__title"><h1>${t}</h1></div>
    <div class="topbar__spacer"></div>
    <button class="btn btn--ghost btn--sm">${ICON.plus({ s: 14 })} New chat</button></div>`;

  const composer = (scopeHTML) => `<div class="composer-wrap"><div class="composer-inner">
    <div class="scopebar">${scopeHTML || `<span class="scope-none">${ICON.filter({ s: 12 })} Searching all notebooks you can access</span>`}</div>
    <div class="composer"><div class="composer__top">
      <textarea rows="1" placeholder="Ask anything about Vantor's docs…"></textarea>
      <button class="composer__send">${ICON.arrowUp({ s: 17 })}</button></div>
    <div class="composer__bottom">
      <button class="composer__tool">${ICON.filter({ s: 13 })} Scope</button>
      <button class="composer__tool">${ICON.paperclip({ s: 13 })} Attach page</button>
      <span class="composer__hint">Answers cite OneNote sources · <span class="kbd">↵</span> to send</span>
    </div></div></div></div>`;

  const shell = ({ title, center, source, theme, scope, fh }) => `
    <div class="frame-scaler"><div class="frame" data-theme="${theme || "dark"}" data-density="compact"${fh ? ` style="--fh:${fh}px"` : ""}>
      <div class="app pa" data-source="${source ? "open" : "closed"}">
        ${rail()}
        <main class="center">${topbar(title)}<div class="thread">${center}</div>${composer(scope)}</main>
        <aside class="source">${source || ""}</aside>
      </div>
    </div></div>`;

  /* ---------- a full grounded answer (static replica of streamAnswer) ---------- */
  function answer(aid, activeCite) {
    const a = ANSWERS[aid];
    const freshCls = a.fresh_warn ? "chip-meta chip-meta--warn" : "chip-meta";
    const meta = `<div class="answer-meta">
      <span class="chip-meta"><span>${ICON.layers({ s: 12 })}</span> Based on <b>${a.coverage} page${a.coverage > 1 ? "s" : ""}</b></span>
      <span class="${freshCls}"><span>${ICON.clock({ s: 12 })}</span> ${a.freshness}</span>
      ${a.fresh_warn ? `<span class="chip-meta chip-meta--warn"><span>${ICON.alert({ s: 12 })}</span> Verify before relying</span>` : ""}
    </div>`;
    let prose = a.html.trim();
    if (activeCite) prose = prose.replace(`class="cite" data-c="${activeCite}"`, `class="cite is-active" data-c="${activeCite}"`);
    const sources = `<div class="srcline"><div class="srcline__h">${ICON.book({ s: 12 })} Sources · ${a.sources.length} OneNote page${a.sources.length > 1 ? "s" : ""}</div>`
      + a.sources.map((s, i) => R.srcCard(s, i + 1)).join("") + `</div>`;
    const fu = `<div class="followups">` + a.followups.map(f => `<button class="chip-follow">${ICON.sparkle({ s: 13 })} ${f}</button>`).join("") + `</div>`;
    const fb = ``;
    return `<div class="thread__inner">
      <div class="msg msg--user"><div class="bubble-user">${a.q}</div></div>
      <div class="msg msg--bot"><div class="bot-ava">${L(15)}</div>
        <div class="bot-body">
          <div class="bot-name">Knowledge Assistant <span class="tag">Grounded answer</span></div>
          ${meta}<div class="prose">${prose}</div>${sources}${fu}${fb}
        </div></div>
    </div>`;
  }

  const scopeChip = (label, path) => `<span class="scopebar__label">Scope</span>
    <span class="scope-chip">${ICON.page({ s: 12 })}<span>${label}</span>
    <span class="scope-chip__path">${path}</span>
    <button class="scope-chip__x">${ICON.x({ s: 13 })}</button></span>`;

  const exec = NOTEBOOKS.find(n => n.id === "nb-exec");

  /* ---------- pages ---------- */
  const PAGES = [
    { b: "Home", s: "Role-aware welcome, dynamic suggestions & topic cards", fh: 1180,
      html: shell({ title: "Home", center: R.home(), fh: 1180 }) },

    { b: "Grounded answer + source panel", s: "Inline citations, coverage & freshness, source verification", fh: 1120,
      html: shell({ title: "How much parental leave am I eligible for…", source: R.sourcePanel("S1", 1), fh: 1120,
        center: answer("A_parental", 1),
        scope: scopeChip("Parental Leave (US)", "People &amp; HR ▸ Benefits") }) },

    { b: "No answer found", s: "Admits the gap gracefully and turns it into a flaggable request", fh: 680,
      html: shell({ title: "No answer found", fh: 680,
        center: `<div class="thread__inner">
          <div class="msg msg--user"><div class="bubble-user">What's our policy on paying contractors in cryptocurrency?</div></div>
          <div class="msg msg--bot"><div class="bot-ava">${L(15)}</div><div class="bot-body">
          ${R.noAnswer("What's our policy on paying contractors in cryptocurrency?")}</div></div></div>` }) },

    { b: "Restricted notebook", s: "Permission-scoped access, mirrors OneNote + SSO groups", fh: 660,
      html: shell({ title: exec.name, fh: 660,
        center: `<div class="thread__inner">${R.restricted(exec)}</div>` }) },

    { b: "Light mode", s: "Same product, light theme — Finance answer", fh: 1000,
      html: shell({ theme: "light", title: "How do I expense a client dinner?", fh: 1000,
        center: answer("A_expense"), source: R.sourcePanel("S4", 1) }) },
  ];

  const doc = document.getElementById("doc");
  doc.innerHTML = PAGES.map((p, i) => {
    const fh = p.fh || 900;
    const pz = Math.min(0.81, 740 / (fh + 30)).toFixed(3);
    return `<div class="page" style="--pz:${pz}"><div class="cap"><span class="num">${String(i + 1).padStart(2, "0")}</span><b>${p.b}</b><span>${p.s}</span></div>${p.html}</div>`;
  }).join("");

  /* ---------- auto-print ---------- */
  window.__ready = false;
  document.fonts.ready.then(() => setTimeout(() => { window.__ready = true; window.print(); }, 600));
})();
</script>
</body>
</html>

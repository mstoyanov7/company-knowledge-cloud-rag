name: cloud-rag-diploma

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT}:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  rag-api:
    build:
      context: .
      dockerfile: services/rag-api/Dockerfile
    env_file:
      - .env
    ports:
      - "${RAG_API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  sync-worker:
    build:
      context: .
      dockerfile: services/sync-worker/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${OPENWEBUI_PORT}:8080"
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: http://rag-api:8080/v1
      OPENAI_API_KEY: ${MOCK_API_KEY}
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      rag-api:
        condition: service_healthy

volumes:
  open-webui-data:
  postgres-data:
  qdrant-data:

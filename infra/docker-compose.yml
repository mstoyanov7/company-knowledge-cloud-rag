name: cloud-rag-diploma

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT}:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  rag-api:
    build:
      context: ..
      dockerfile: services/rag-api/Dockerfile
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      RAG_API_PORT: 8080
    ports:
      - "${RAG_API_PORT}:8080"
    volumes:
      - ../.cache:/workspace/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  company-knowledge-ui:
    build:
      context: ../apps/company-knowledge-ui
      dockerfile: Dockerfile
    environment:
      VITE_RAG_API_PROXY_TARGET: http://rag-api:8080
      VITE_RAG_API_KEY: ${RAG_API_KEY}
    ports:
      - "${COMPANY_KNOWLEDGE_UI_PORT:-5173}:5173"
    depends_on:
      rag-api:
        condition: service_healthy

  sync-worker:
    build:
      context: ..
      dockerfile: services/sync-worker/Dockerfile
    command: ["ops_worker"]
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ../.cache:/workspace/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  onenote-poller:
    build:
      context: ..
      dockerfile: services/sync-worker/Dockerfile
    command: ["onenote_incremental", "--run-loop"]
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ../.cache:/workspace/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
